services:
  api:
    build: .
    command: uvicorn smart_lab.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    environment:
      SMART_LAB_DATABASE_URL: postgresql+asyncpg://smart_lab:smart_lab@postgres:5432/smart_lab
    ports:
      - "8000:8000"
      - "9100:9100"
    volumes:
      - .:/app
    depends_on:
      - postgres

  grpc:
    build: .
    command: python -m smart_lab.grpc_server.server
    env_file:
      - .env.example
    environment:
      SMART_LAB_DATABASE_URL: postgresql+asyncpg://smart_lab:smart_lab@postgres:5432/smart_lab
    ports:
      - "50051:50051"
    volumes:
      - .:/app
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_lab
      POSTGRES_USER: smart_lab
      POSTGRES_PASSWORD: smart_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
